<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Health | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-page">
    <div class="auth-container glassmorphism">
        <div class="auth-header">
            <i class="fas fa-heartbeat text-primary" style="font-size: 3rem; margin-bottom: 1rem;"></i>
            <h2>Welcome Back</h2>
            <p>Sign in to manage your health</p>
        </div>
        
        <form id="login-form">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn btn-primary w-100">Log In</button>
        </form>
        
        <div class="auth-footer text-center mt-4">
            <p>Don't have an account? <a href="register.html" class="text-primary font-weight-bold">Register here</a></p>
        </div>
    </div>
    
    <div id="toast" class="toast hidden"></div>
    <script src="js/auth.js"></script>
</body>
</html>
