<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Health | Appointments</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-heartbeat text-primary"></i> Smart Health</h2>
            </div>
            <ul class="nav-menu">
                <li><a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="symptoms.html"><i class="fas fa-stethoscope"></i> Symptoms Checker</a></li>
                <li><a href="medicines.html"><i class="fas fa-pills"></i> Medicine Reminders</a></li>
                <li class="active"><a href="appointments.html"><i class="fas fa-calendar-alt"></i> Appointments</a></li>
                <li><a href="analytics.html"><i class="fas fa-chart-line"></i> Analytics</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <header class="navbar">
                <h1>Appointment Booking</h1>
                <div class="user-profile">
                    <span id="user-name">Welcome, User</span>
                    <button class="btn btn-outline" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
                </div>
            </header>

            <div class="content-wrapper split-layout">
                <div class="card p-4">
                    <h3>Book an Appointment</h3>
                    <form id="appointment-form">
                        <div class="form-group mt-3">
                            <label>Doctor Name / Specialty</label>
                            <input type="text" id="appt-doctor" required placeholder="e.g. Dr. Smith (Cardiology)">
                        </div>
                        <div class="form-group">
                            <label>Date</label>
                            <input type="date" id="appt-date" required>
                        </div>
                        <div class="form-group">
                            <label>Time</label>
                            <input type="time" id="appt-time" required>
                        </div>
                        <div class="form-group">
                            <label>Reason for Visit</label>
                            <textarea id="appt-reason" rows="3" required placeholder="Brief description..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-warning w-100"><i class="fas fa-calendar-plus"></i> Book Appointment</button>
                    </form>
                </div>

                <div class="card p-4">
                    <h3>My Appointments</h3>
                    <ul class="item-list mt-3" id="appointments-list">
                        <!-- Populated via JS -->
                    </ul>
                </div>
            </div>
        </main>
    </div>
    
    <div id="toast" class="toast hidden"></div>
    <script src="js/main.js"></script>
</body>
</html>
