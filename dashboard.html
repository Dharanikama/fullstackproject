<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Health | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-heartbeat text-primary"></i> Smart Health</h2>
            </div>
            <ul class="nav-menu">
                <li class="active"><a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="symptoms.html"><i class="fas fa-stethoscope"></i> Symptoms Checker</a></li>
                <li><a href="medicines.html"><i class="fas fa-pills"></i> Medicine Reminders</a></li>
                <li><a href="appointments.html"><i class="fas fa-calendar-alt"></i> Appointments</a></li>
                <li><a href="analytics.html"><i class="fas fa-chart-line"></i> Analytics</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Navbar -->
            <header class="navbar">
                <h1>Dashboard Overview</h1>
                <div class="user-profile">
                    <span id="user-name">Welcome, User</span>
                    <button class="btn btn-outline" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
                </div>
            </header>

            <div class="content-wrapper">
                <!-- Health Summary Cards -->
                <div class="cards-grid">
                    <div class="stat-card">
                        <div class="stat-icon bg-primary-light text-primary"><i class="fas fa-file-medical-alt"></i></div>
                        <div class="stat-details">
                            <h3>Health Score</h3>
                            <h2 id="health-score-display">--/100</h2>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon bg-success-light text-success"><i class="fas fa-pills"></i></div>
                        <div class="stat-details">
                            <h3>Active Medicines</h3>
                            <h2 id="med-count">0</h2>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon bg-warning-light text-warning"><i class="fas fa-calendar-check"></i></div>
                        <div class="stat-details">
                            <h3>Appointments</h3>
                            <h2 id="appt-count">0</h2>
                        </div>
                    </div>
                </div>

                <!-- Dashboard Details -->
                <div class="dashboard-details">
                    <div class="detail-card">
                        <h3><i class="fas fa-pills text-success mr-2"></i> Today's Medicines</h3>
                        <ul class="item-list" id="dash-medicines">
                        </ul>
                        <a href="medicines.html" class="btn btn-outline mt-4 w-100 text-center">Manage Medicines</a>
                    </div>
                    
                    <div class="detail-card">
                        <h3><i class="fas fa-calendar-alt text-warning mr-2"></i> Upcoming Appointments</h3>
                        <ul class="item-list" id="dash-appointments">
                        </ul>
                        <a href="appointments.html" class="btn btn-outline mt-4 w-100 text-center">Book Appointments</a>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <div id="toast" class="toast hidden"></div>
    <script src="js/main.js"></script>
</body>
</html>
